<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase OAuth Client</title>
</head>
<body>
  <h1>Supabase OAuth Client</h1>
  <button id="auth-btn">supabase auth</button>

  <script type="module">
    document.getElementById('auth-btn').addEventListener('click', async () => {
      const { authorizationUrl } = await fetch('/auth-url').then(r => r.json());
      window.location.href = authorizationUrl;
    });
  </script>
</body>
</html>
